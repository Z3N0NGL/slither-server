<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slither.io - Z3N0 Edition</title>
    <style>
        :root {
            --bg: #0a0a1a; --card: #1a1a24; --accent: #7289da;
            --danger: #ff4444; --success: #44ff44; --border: #2a2a3a;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; overflow:hidden; font-family:'Segoe UI',Arial; color:#fff; user-select:none; }
        .screen { width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; position:absolute; top:0; left:0; background:linear-gradient(135deg,#0a0a1a,#1a1a2e); }
        .hidden { display:none !important; }
        .login-container { text-align:center; }
        .logo h1 { font-size:4rem; font-weight:800; background:linear-gradient(135deg,#7289da,#44ff44); -webkit-background-clip:text; -webkit-text-fill-color:transparent; animation:glow 2s infinite alternate; }
        @keyframes glow { from{filter:drop-shadow(0 0 10px rgba(114,137,218,0.5));} to{filter:drop-shadow(0 0 30px rgba(68,255,68,0.5));} }
        .login-card { background:var(--card); border-radius:20px; padding:2.5rem; min-width:350px; border:1px solid var(--border); backdrop-filter:blur(20px); }
        .discord-btn { width:100%; padding:1rem; background:var(--accent); border:none; color:#fff; font-size:1.2rem; border-radius:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; font-weight:600; margin-bottom:10px; }
        .discord-btn:hover { filter:brightness(1.2); }
        .unlink-btn { background:var(--danger); }
        #game-canvas { position:absolute; top:0; left:0; }
        .ui-panel { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(19,19,26,0.95); border:1px solid var(--border); border-radius:16px; padding:20px; min-width:300px; max-height:70vh; overflow-y:auto; z-index:200; }
        .admin-tabs { display:flex; gap:5px; margin-bottom:1rem; }
        .admin-tab { flex:1; padding:8px; background:#1a1a24; border:1px solid var(--border); color:#fff; border-radius:8px 8px 0 0; cursor:pointer; }
        .admin-tab.active { background:var(--accent); border-color:var(--accent); }
        .admin-tab-content { display:none; }
        .admin-tab-content.active { display:block; }
        .action-btn { padding:5px 10px; border-radius:6px; border:none; cursor:pointer; font-size:0.8rem; margin:2px; color:#fff; }
        .action-btn.tp{background:#4a90d9} .action-btn.br{background:#9b59b6}
        .action-btn.kk{background:#ffaa00;color:#000} .action-btn.kl{background:#ff4444}
        .action-btn.sz{background:#44ff44;color:#000}
        #fps { position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.7); padding:5px 15px; border-radius:20px; font-size:0.9rem; z-index:100; }
        #death { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,0,0,0.2); display:flex; align-items:center; justify-content:center; z-index:150; opacity:0; pointer-events:none; transition:opacity 0.3s; }
        #death.visible { opacity:1; }
        #death span { font-size:4rem; font-weight:800; text-shadow:0 0 30px rgba(255,0,0,0.8); }
        #notif { position:absolute; top:100px; left:50%; transform:translateX(-50%); background:#1a1a24; padding:10px 25px; border-radius:30px; z-index:300; opacity:0; transition:opacity 0.3s; }
        #notif.show { opacity:1; }
        .feature-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); }
    </style>
</head>
<body>
    <div id="login-screen" class="screen">
        <div class="login-container">
            <div class="logo"><h1>🐍 SLITHER<span style="color:#44ff44">.IO</span></h1></div>
            <div class="login-card">
                <h2>Login with Discord</h2>
                <button id="login-btn" class="discord-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
                    Login with Discord
                </button>
                <button id="unlink-btn" class="discord-btn unlink-btn">Unlink Account</button>
                <div id="login-status"></div>
            </div>
        </div>
    </div>

    <div id="game-screen" class="screen hidden">
        <canvas id="game-canvas"></canvas>
        <div style="position:absolute;top:20px;left:50%;transform:translateX(-50%);display:flex;gap:20px;z-index:100;background:rgba(0,0,0,0.7);padding:8px 20px;border-radius:30px;">
            <span id="pname">Player</span>
            <span>Score: <span id="score">0</span></span>
            <button id="lb-btn" style="background:none;border:none;font-size:1.5rem;cursor:pointer;">🏆</button>
            <button id="admin-btn" style="background:none;border:none;font-size:1.5rem;cursor:pointer;">⚡</button>
        </div>
        <div id="fps">60 FPS</div>
        <div id="death"><span>YOU DIED</span></div>
        <div id="notif"></div>

        <!-- Settings -->
        <div id="settings-panel" class="ui-panel hidden">
            <h3>⚙️ Settings</h3>
            <div class="feature-row"><label>Movement:</label> <select id="movement"><option value="mouse">Mouse</option><option value="wasd">WASD</option></select></div>
            <div class="feature-row"><label>Quality:</label> <select id="quality"><option value="high">High</option><option value="low">Low</option></select></div>
            <button id="close-settings" style="width:100%;margin-top:10px;">Close</button>
        </div>

        <!-- Leaderboard -->
        <div id="lb-panel" class="ui-panel hidden">
            <h3>🏆 Leaderboard</h3>
            <ol id="lb-list"></ol>
            <button id="close-lb" style="width:100%;margin-top:10px;">Close</button>
        </div>

        <!-- Z3N0 Admin Panel -->
        <div id="admin-panel" class="ui-panel hidden" style="max-width:450px;">
            <div class="admin-tabs">
                <button class="admin-tab active" data-tab="players">👥 Players</button>
                <button class="admin-tab" data-tab="local">🔧 Local</button>
                <button class="admin-tab" data-tab="cosmetics">🎨 Cosmetics</button>
            </div>

            <!-- Players tab -->
            <div id="admin-players" class="admin-tab-content active">
                <h3>Connected Players</h3>
                <div id="player-list"></div>
            </div>

            <!-- Local tab -->
            <div id="admin-local" class="admin-tab-content hidden">
                <h3>Local Features</h3>
                <div class="feature-row"><label>Speed Multiplier:</label> <input type="range" id="speed" min="1" max="10" step="0.5" value="1"> <span id="speed-val">1x</span></div>
                <div class="feature-row"><label>ESP:</label> <input type="checkbox" id="esp"></div>
                <div class="feature-row"><label>3D View:</label> <input type="checkbox" id="3dview"></div>
                <div class="feature-row"><label>God Mode (Anti-Kill):</label> <input type="checkbox" id="god"></div>
                <div class="feature-row"><label>Give Self Size:</label> <input type="number" id="self-size" value="10" min="1" style="width:60px;"> <button id="giveself" class="action-btn sz">Apply</button></div>
            </div>

            <!-- Cosmetics tab -->
            <div id="admin-cosmetics" class="admin-tab-content hidden">
                <h3>Tag Management</h3>
                <div class="feature-row"><span>Z3N0</span> <div><input type="color" id="tag-z3n0" value="#ff4444"> <button class="apply-tag" data-tag="Z3N0">Apply</button></div></div>
                <div class="feature-row"><span>Quad</span> <div><input type="color" id="tag-quad" value="#44ff44"> <button class="apply-tag" data-tag="Quad">Apply</button></div></div>
                <div class="feature-row"><span>Shadow</span> <div><input type="color" id="tag-shadow" value="#9b59b6"> <button class="apply-tag" data-tag="Shadow">Apply</button></div></div>
                <div class="feature-row"><span>Pingio</span> <div><input type="color" id="tag-pingio" value="#ffaa00"> <button class="apply-tag" data-tag="Pingio">Apply</button></div></div>
                <div class="feature-row" style="flex-direction:column;align-items:flex-start;">
                    <label>Custom Tag:</label>
                    <div style="display:flex;gap:5px;width:100%;">
                        <input type="text" id="custom-tag" placeholder="Tag name" style="flex:1;">
                        <input type="color" id="custom-color" value="#ffffff">
                        <button id="apply-custom">Apply</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script>
        // ==================== CONFIG ====================
        const DISCORD_CLIENT_ID = '1521216585292058734';
        const REDIRECT_URI = 'https://slither-server.vercel.app';
        const PLAYFAB_TITLE = '10C130';
        const SERVER = 'https://slither-game-server-ultm.onrender.com';
        const WORLD_W = 5000, WORLD_H = 5000, BORDER = 20;

        // ==================== STATE ====================
        let socket, playerId, playerName = 'Player';
        let players = [], orbs = [];
        let mouseX = 0, mouseY = 0, camX = 0, camY = 0;
        let movement = 'mouse', keys = {}, boosting = false;
        let fps = 0, lastTime = 0, frames = 0;
        let admin = { speed: 1, esp: false, view3D: false, god: false };
        let hasZ3N0 = false, playfabReady = false;

        // DOM
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        const loginScreen = document.getElementById('login-screen');
        const gameScreen = document.getElementById('game-screen');
        const scoreEl = document.getElementById('score');
        const nameEl = document.getElementById('pname');
        const fpsEl = document.getElementById('fps');
        const deathEl = document.getElementById('death');
        const notif = document.getElementById('notif');
        const lbList = document.getElementById('lb-list');
        const playerListEl = document.getElementById('player-list');
        const loginStatus = document.getElementById('login-status');
        const unlinkBtn = document.getElementById('unlink-btn');

        // ==================== DISCORD AUTH ====================
        function checkLogin() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const token = params.get("access_token");
            const saved = localStorage.getItem("discord_user");
            if (saved) {
                const user = JSON.parse(saved);
                playerName = user.username;
                initPlayFab(user);
                showGame(user);
            } else if (token) {
                fetch(SERVER + "/api/discord/me?token=" + token)
                .then(r => r.json())
                .then(user => {
                    if (user.username) {
                        localStorage.setItem("discord_user", JSON.stringify(user));
                        playerName = user.username;
                        window.location.hash = "";
                        initPlayFab(user);
                        showGame(user);
                    } else {
                        loginStatus.textContent = "Login failed";
                    }
                }).catch(() => { loginStatus.textContent = "Login failed"; });
            }
        }

        document.getElementById('login-btn').addEventListener('click', () => {
            window.top.location.href = `https://discord.com/api/oauth2/authorize?client_id=${DISCORD_CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=identify`;
        });
        unlinkBtn.addEventListener('click', () => {
            localStorage.removeItem('discord_user');
            location.reload();
        });

        function showGame(user) {
            loginStatus.innerHTML = `✅ Logged in as <strong>${user.username}</strong>`;
            unlinkBtn.style.display = 'block';
            setTimeout(() => {
                loginScreen.classList.add('hidden');
                gameScreen.classList.remove('hidden');
                connectServer();
            }, 1500);
        }

        // ==================== PLAYFAB ====================
        async function initPlayFab(user) {
            try {
                await waitForPlayFab();
                PlayFab.settings.titleId = PLAYFAB_TITLE;
                PlayFabClientAPI.LoginWithCustomID({ CustomId: user.id, CreateAccount: true }, result => {
                    playfabReady = true;
                    PlayFabClientAPI.GetUserData({ Keys: ["tag"] }, (data, err) => {
                        if (data && data.Data && data.Data.tag && data.Data.tag.Value === "Z3N0") {
                            hasZ3N0 = true;
                        }
                    });
                });
            } catch (e) {
                console.log("PlayFab unavailable – admin panel open for now");
                hasZ3N0 = true;
            }
        }


        // ==================== SERVER ====================
        function connectServer() {
            socket = io(SERVER, { transports: ['websocket'] });
            socket.on('connect', () => {
                socket.emit('join', { name: playerName });
                notifMsg('Connected!');
            });
            socket.on('playerId', id => playerId = id);
            socket.on('gameState', state => {
                players = state.players;
                orbs = state.orbs;
                updateUI();
            });
            socket.on('playerDied', data => {
                deathEl.classList.add('visible');
                setTimeout(() => deathEl.classList.remove('visible'), 2000);
            });
            socket.on('playerRespawned', () => notifMsg('Respawned!'));
            socket.on('disconnect', () => notifMsg('Disconnected'));
            socket.on('connect_error', () => notifMsg('Server unreachable'));
        }

        // ==================== INPUT ====================
        canvas.addEventListener('mousemove', e => {
            mouseX = e.clientX; mouseY = e.clientY;
            if (movement === 'mouse' && socket && playerId) {
                const me = players.find(p => p.id === playerId);
                if (me) socket.emit('mouseMove', { x: me.x + (mouseX - canvas.width / 2), y: me.y + (mouseY - canvas.height / 2) });
            }
        });
        document.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === ' ') { boosting = true; socket?.emit('boosting', true); }
        });
        document.addEventListener('keyup', e => {
            keys[e.key.toLowerCase()] = false;
            if (e.key === ' ') { boosting = false; socket?.emit('boosting', false); }
        });

        // ==================== GAME LOOP ====================
        function gameLoop(ts) {
            frames++;
            if (ts - lastTime >= 1000) { fps = frames; frames = 0; lastTime = ts; fpsEl.textContent = fps + ' FPS'; }

            if (movement === 'wasd' && socket && playerId) {
                let angle = null;
                if (keys['w'] || keys['arrowup']) {
                    if (keys['a'] || keys['arrowleft']) angle = -Math.PI * 3 / 4;
                    else if (keys['d'] || keys['arrowright']) angle = -Math.PI / 4;
                    else angle = -Math.PI / 2;
                } else if (keys['s'] || keys['arrowdown']) {
                    if (keys['a'] || keys['arrowleft']) angle = Math.PI * 3 / 4;
                    else if (keys['d'] || keys['arrowright']) angle = Math.PI / 4;
                    else angle = Math.PI / 2;
                } else if (keys['a'] || keys['arrowleft']) angle = Math.PI;
                else if (keys['d'] || keys['arrowright']) angle = 0;
                if (angle !== null) socket.emit('keyMove', { angle, boosting });
            }

            socket?.emit('updateMovement', { speedMultiplier: admin.speed, antiKill: admin.god });

            const me = players.find(p => p.id === playerId);
            if (me) {
                camX = me.x - canvas.width / 2;
                camY = me.y - canvas.height / 2;
                scoreEl.textContent = Math.floor(me.score || 0);
                nameEl.textContent = me.name;
            }

            render();
            requestAnimationFrame(gameLoop);
        }

        // ==================== RENDER ====================
        function render() {
            const quality = document.getElementById('quality')?.value || 'high';
            ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save(); ctx.translate(-camX, -camY);

            // Grid
            ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 1;
            const gs = 100, sx = Math.floor(camX / gs) * gs, sy = Math.floor(camY / gs) * gs;
            for (let x = sx; x < camX + canvas.width + gs; x += gs) { ctx.beginPath(); ctx.moveTo(x, camY); ctx.lineTo(x, camY + canvas.height); ctx.stroke(); }
            for (let y = sy; y < camY + canvas.height + gs; y += gs) { ctx.beginPath(); ctx.moveTo(camX, y); ctx.lineTo(camX + canvas.width, y); ctx.stroke(); }

            // Border
            ctx.strokeStyle = '#ff4444'; ctx.lineWidth = BORDER; ctx.strokeRect(0, 0, WORLD_W, WORLD_H);
            ctx.strokeStyle = 'rgba(255,68,68,0.3)'; ctx.lineWidth = BORDER * 2;
            ctx.strokeRect(-BORDER/2, -BORDER/2, WORLD_W + BORDER, WORLD_H + BORDER);

            // Orbs (culled)
            for (let o of orbs) {
                if (o.x < camX - 50 || o.x > camX + canvas.width + 50 || o.y < camY - 50 || o.y > camY + canvas.height + 50) continue;
                ctx.fillStyle = o.color;
                ctx.beginPath(); ctx.arc(o.x, o.y, 7 + (quality === 'high' ? Math.sin(o.pulse || 0) * 2 : 0), 0, Math.PI * 2); ctx.fill();
                if (quality === 'high') {
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.beginPath(); ctx.arc(o.x - 2, o.y - 2, 3, 0, Math.PI * 2); ctx.fill();
                }
            }

            // Players
            for (let p of players) {
                if (!p.isAlive || !p.segments) continue;
                const head = p.segments[0];
                if (head.x < camX - 150 || head.x > camX + canvas.width + 150 || head.y < camY - 150 || head.y > camY + canvas.height + 150) continue;

                // ESP
                if (admin.esp && p.id !== playerId) {
                    ctx.strokeStyle = 'yellow'; ctx.lineWidth = 1;
                    ctx.strokeRect(head.x - 40, head.y - 40, 80, 80);
                    ctx.fillStyle = 'yellow'; ctx.font = '12px Arial'; ctx.textAlign = 'center';
                    ctx.fillText(p.name, head.x, head.y - 50);
                }

                // Segments
                for (let i = p.segments.length - 1; i >= 0; i--) {
                    const seg = p.segments[i];
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = 1 - (i / p.segments.length) * 0.4;
                    ctx.beginPath(); ctx.arc(seg.x, seg.y, seg.radius, 0, Math.PI * 2); ctx.fill();
                }
                ctx.globalAlpha = 1;

                // Eyes
                const eyeAngle = p.angle || 0, eyeOff = head.radius * 0.5;
                ctx.fillStyle = 'white';
                ctx.beginPath(); ctx.arc(head.x + Math.cos(eyeAngle - 0.5) * eyeOff, head.y + Math.sin(eyeAngle - 0.5) * eyeOff, head.radius * 0.35, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(head.x + Math.cos(eyeAngle + 0.5) * eyeOff, head.y + Math.sin(eyeAngle + 0.5) * eyeOff, head.radius * 0.35, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = 'black';
                ctx.beginPath(); ctx.arc(head.x + Math.cos(eyeAngle - 0.5) * eyeOff + Math.cos(eyeAngle) * 3, head.y + Math.sin(eyeAngle - 0.5) * eyeOff + Math.sin(eyeAngle) * 3, head.radius * 0.2, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(head.x + Math.cos(eyeAngle + 0.5) * eyeOff + Math.cos(eyeAngle) * 3, head.y + Math.sin(eyeAngle + 0.5) * eyeOff + Math.sin(eyeAngle) * 3, head.radius * 0.2, 0, Math.PI * 2); ctx.fill();

                // Name & tag
                ctx.fillStyle = 'white'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center';
                ctx.fillText(p.name, head.x, head.y - head.radius - 15);
                if (p.tag) {
                    ctx.fillStyle = p.tagColor || '#fff'; ctx.font = 'bold 11px Arial';
                    ctx.fillText(`[${p.tag}]`, head.x, head.y - head.radius - 30);
                }
                // Highlight own player
                if (p.id === playerId) {
                    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.arc(head.x, head.y, head.radius + 5, 0, Math.PI * 2); ctx.stroke();
                }
            }

            // 3D View effect
            if (admin.view3D) {
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fillRect(camX, camY + canvas.height * 0.7, canvas.width, canvas.height * 0.3);
                for (let p of players) {
                    if (!p.isAlive || !p.segments) continue;
                    const head = p.segments[0];
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.beginPath(); ctx.ellipse(head.x, head.y + 15, head.radius, head.radius * 0.2, 0, 0, Math.PI * 2); ctx.fill();
                }
            }

            ctx.restore();

            // Crosshair
            if (movement === 'mouse') {
                ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(mouseX, mouseY, 10, 0, Math.PI * 2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(mouseX - 15, mouseY); ctx.lineTo(mouseX + 15, mouseY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(mouseX, mouseY - 15); ctx.lineTo(mouseX, mouseY + 15); ctx.stroke();
            }
        }

        // ==================== UI UPDATES ====================
        function updateUI() {
            const sorted = [...players].sort((a, b) => (b.score || 0) - (a.score || 0)).slice(0, 10);
            lbList.innerHTML = sorted.map((p, i) => `<li>${p.name} <span>${Math.floor(p.score || 0)}</span></li>`).join('');

            playerListEl.innerHTML = players.map(p => `
                <div style="background:#1a1a24;padding:10px;margin:5px 0;border-radius:8px;">
                    <strong>${p.name}</strong> ${p.tag ? `[${p.tag}]` : ''} — ${Math.floor(p.score || 0)}
                    ${p.id !== playerId ? `
                    <div style="margin-top:5px;">
                        <button class="action-btn tp" onclick="adminAction('${p.id}','teleportTo')">📍 TP</button>
                        <button class="action-btn br" onclick="adminAction('${p.id}','bringHere')">🔄 Bring</button>
                        <button class="action-btn kk" onclick="adminAction('${p.id}','kick')">🚫 Kick</button>
                        <button class="action-btn kl" onclick="adminAction('${p.id}','kill')">💀 Kill</button>
                        <button class="action-btn sz" onclick="adminAction('${p.id}','giveSize')">📏 +Size</button>
                    </div>` : '<small>(You)</small>'}
                </div>
            `).join('');
        }

        function adminAction(targetId, action) {
            socket?.emit('adminAction', { targetId, action });
            notifMsg(`Admin: ${action}`);
        }

        function notifMsg(msg) {
            notif.textContent = msg;
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 3000);
        }

        // ==================== EVENT LISTENERS ====================
        document.getElementById('movement').addEventListener('change', e => movement = e.target.value);
        document.getElementById('speed').addEventListener('input', e => {
            admin.speed = parseFloat(e.target.value);
            document.getElementById('speed-val').textContent = admin.speed.toFixed(1) + 'x';
        });
        document.getElementById('esp').addEventListener('change', e => admin.esp = e.target.checked);
        document.getElementById('3dview').addEventListener('change', e => admin.view3D = e.target.checked);
        document.getElementById('god').addEventListener('change', e => {
            admin.god = e.target.checked;
            notifMsg(e.target.checked ? 'God Mode ON' : 'God Mode OFF');
        });
        document.getElementById('giveself').addEventListener('click', () => {
            socket?.emit('adminAction', { targetId: playerId, action: 'giveSize' });
            notifMsg('Gave yourself size');
        });

        // Tag application
        document.querySelectorAll('.apply-tag').forEach(btn => btn.addEventListener('click', () => {
            const tag = btn.dataset.tag;
            const color = document.getElementById(`tag-${tag.toLowerCase()}`).value;
            socket?.emit('updateTag', { tag, tagColor: color });
                            if (playfabReady) { fetch("https://" + PLAYFAB_TITLE + ".playfabapi.com/Client/UpdateUserData", { method: "POST", headers: { "Content-Type": "application/json", "X-Authorization": sessionTicket }, body: JSON.stringify({ Data: { tag: tag, tagColor: color } }) }); }
        }));
        document.getElementById('apply-custom').addEventListener('click', () => {
            const tag = document.getElementById('custom-tag').value;
            const color = document.getElementById('custom-color').value;
            if (tag) {
                socket?.emit('updateTag', { tag, tagColor: color });
                            if (playfabReady) { fetch("https://" + PLAYFAB_TITLE + ".playfabapi.com/Client/UpdateUserData", { method: "POST", headers: { "Content-Type": "application/json", "X-Authorization": sessionTicket }, body: JSON.stringify({ Data: { tag: tag, tagColor: color } }) }); }
            }
        });

        // Panel toggles
        document.getElementById('lb-btn').addEventListener('click', () => document.getElementById('lb-panel').classList.toggle('hidden'));
        document.getElementById('close-lb').addEventListener('click', () => document.getElementById('lb-panel').classList.add('hidden'));
        document.getElementById('admin-btn').addEventListener('click', () => {
            if (!hasZ3N0) { notifMsg('🔒 You need the Z3N0 tag to access the admin panel'); return; }
            document.getElementById('admin-panel').classList.toggle('hidden');
        });
        document.getElementById('settings-btn')?.addEventListener('click', () => document.getElementById('settings-panel').classList.toggle('hidden'));
        document.getElementById('close-settings').addEventListener('click', () => document.getElementById('settings-panel').classList.add('hidden'));

        // Admin tabs
        document.querySelectorAll('.admin-tab').forEach(tab => tab.addEventListener('click', () => {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.admin-tab-content').forEach(c => c.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(`admin-${tab.dataset.tab}`).classList.add('active');
        }));

        // Escape to close panels
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') document.querySelectorAll('.ui-panel').forEach(p => p.classList.add('hidden'));
        });

        // ==================== START ====================
        checkLogin();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
